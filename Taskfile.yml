version: "3"

# The compiled Agda binaries and the QuickCheck reports emit non-ASCII
# (em-dashes, ✓, ·); force a UTF-8 locale so they don't crash at runtime.
env:
  LC_ALL: C.UTF-8
  LANG: C.UTF-8

# ─────────────────────────────────────────────────────────────────────────
# The two differential-test workflows, from the repo root:
#
#   task oracle       rxjs (TS) vs the Agda oracle, per generated program
#   task quickcheck   impl- vs spec-batchSimultaneous, all in Agda
#
# Both take arguments after `--`. See each task below for the exact syntax
# and seed examples. `task --list` shows the one-line descriptions.
# ─────────────────────────────────────────────────────────────────────────

tasks:
  default:
    desc: Show available tasks
    cmds:
    - task --list

  agda:
    dir: agda
    desc: typecheck the Agda source (src/Main.agda)
    cmds:
    - agda src/Main.agda

  ts-check:
    dir: typescript
    desc: typecheck the TypeScript source
    cmds:
    - npm run typecheck

  # ── the differential test: rxjs (TS) vs the Agda oracle ──────────────────

  cli-build:
    dir: agda
    desc: compile the Agda differential-test CLI (agda/_cli/Main)
    cmds:
    - agda --compile --compile-dir=_cli src/CLI/Main.agda

  oracle:
    dir: typescript
    deps: [cli-build]
    desc: >-
      The TypeScript "main": generate programs from seeds, evaluate each and run
      batchSimultaneous, in BOTH rxjs and Agda (in parallel), report every diff.
    # Flags pass through after `--` (see src/prop-test.ts):
    #   task oracle                          full seed sweep (genSeeds())
    #   task oracle -- --seed 1              ONE seed only
    #   task oracle -- --operator mergeAll   bias every program's root operator
    # Emits to a throwaway temp dir and deletes it on exit — no build output
    # is left in the tree (tsconfig stays noEmit:true).
    cmds:
    - npm run oracle -- {{.CLI_ARGS}}

  # ── the all-Agda QuickCheck: impl-batchSimultaneous vs spec ──────────────

  qc-build:
    dir: agda
    desc: compile the all-Agda QuickCheck binary (agda/_cli/QuickCheck)
    cmds:
    - agda --compile --compile-dir=_cli src/QuickCheck.agda

  quickcheck:
    dir: agda
    deps: [qc-build]
    desc: >-
      All-Agda QuickCheck: sweep seeds, evaluate each program, check the raw
      stream is WellFormed (Rx.Protocol) AND that impl- ≡ spec-batchSimultaneous
      on it, PRINT every mismatch, and append each new distinct failing program
      to Implementation/Unit-Test.agda.
    # Args are FIRST LAST RUNS DEPTH (a seed RANGE; defaults 1 300 200 4).
    # Each seed expands into RUNS random programs of nesting ≤ DEPTH.
    #   task quickcheck                     seeds 1..300, 200 runs each
    #   task quickcheck -- 42 42            ONE seed (42), 200 runs, depth 4
    #   task quickcheck -- 1 500 300 5      seeds 1..500, 300 runs, depth 5
    # The Unit-Test.agda cache is append-only and deduped: passing when there
    # is no known counterexample, so a clean sweep appends nothing.
    cmds:
    - scripts/gen-unit-tests.sh {{.CLI_ARGS}}
